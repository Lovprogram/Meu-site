<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Firebase - Teste</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .box {
      background: white;
      padding: 20px;
      border-radius: 8px;
      width: 330px;
      box-shadow: 0 0 10px #0002;
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      background: #0066ff;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Login / Cadastro</h2>

  <input id="email" type="email" placeholder="Email" />
  <input id="senha" type="password" placeholder="Senha" />

  <button onclick="criarConta()">Criar Conta</button>
  <button onclick="login()">Entrar</button>

  <p id="msg"></p>
</div>

<!-- Firebase SDK -->
<script type="module">
  // Importar os SDKs necessários
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, doc, setDoc } 
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // Suas credenciais do Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyDC-AmBvYKeX9gtdCD7c4NI-2cdnh7qWv8",
    authDomain: "bancoglobal-8e99a.firebaseapp.com",
    projectId: "bancoglobal-8e99a",
    storageBucket: "bancoglobal-8e99a.firebasestorage.app",
    messagingSenderId: "389299294661",
    appId: "1:389299294661:web:79a018a794548fea85fbac",
    measurementId: "G-0HNZFYXE27"
  };

  // Inicializar Firebase
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // Criar conta
  async function criarConta() {
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;
    const msg = document.getElementById("msg");

    try {
      const user = await createUserWithEmailAndPassword(auth, email, senha);

      // Criar usuário no Firestore (como tabela)
      await setDoc(doc(db, "usuarios", user.user.uid), {
        email: email,
        criadoEm: new Date().toISOString()
      });

      msg.innerText = "Conta criada com sucesso!";
    } catch (error) {
      msg.innerText = "Erro: " + error.message;
    }
  }

  // Login
  async function login() {
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;
    const msg = document.getElementById("msg");

    try {
      await signInWithEmailAndPassword(auth, email, senha);
      msg.innerText = "Login realizado!";
    } catch (error) {
      msg.innerText = "Erro: " + error.message;
    }
  }

</script>
</body>
</html>
