<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Relacionamento</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Arial;background:#0f172a;color:#fff;text-align:center}
input,button{padding:10px;margin:5px;border-radius:8px;border:none}
button{background:#22c55e;color:#fff;cursor:pointer}
.card{background:#1e293b;padding:15px;border-radius:10px;margin:10px}
</style>
</head>
<body>

<h1>App de Relacionamento</h1>

<div>
<h2>Cadastro</h2>
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">
<button onclick="register()">Cadastrar</button>
</div>

<div>
<h2>Login</h2>
<button onclick="login()">Entrar</button>
<button onclick="logout()">Sair</button>
</div>

<div>
<h2>Criar Perfil</h2>
<input id="name" placeholder="Nome">
<input id="age" placeholder="Idade">
<button onclick="criarPerfil()">Salvar</button>
</div>

<div>
<h2>Perfis</h2>
<button onclick="carregar()">Carregar</button>
<div id="lista"></div>
</div>

<script>
const supabaseClient = supabase.createClient(
  "https://qarwexzfigotqllnabvi.supabase.co",
  "sb_publishable_ygtPpfJUG4hkNUacV62ziQ_rOihszJg"
);

async function register(){
  const email=document.getElementById("email").value;
  const senha=document.getElementById("senha").value;

  const {error}=await supabaseClient.auth.signUp({email,password:senha});
  if(error) alert(error.message);
  else alert("Cadastrado!");
}

async function login(){
  const email=document.getElementById("email").value;
  const senha=document.getElementById("senha").value;

  const {error}=await supabaseClient.auth.signInWithPassword({email,password:senha});
  if(error) alert(error.message);
  else alert("Logado!");
}

async function logout(){
  await supabaseClient.auth.signOut();
  alert("Saiu");
}

async function criarPerfil(){
  const {data:{user}} = await supabaseClient.auth.getUser();

  const name=document.getElementById("name").value;
  const age=document.getElementById("age").value;

  const {error}=await supabaseClient.from("profiles").insert({
    user_id:user.id,
    name,
    age
  });

  if(error) alert(error.message);
  else alert("Perfil criado");
}

async function carregar(){
  const {data,error}=await supabaseClient.from("profiles").select("*");

  const lista=document.getElementById("lista");
  lista.innerHTML="";

  data.forEach(p=>{
    lista.innerHTML+=`<div class="card">${p.name} - ${p.age}</div>`;
  });
}
</script>

</body>
</html>
